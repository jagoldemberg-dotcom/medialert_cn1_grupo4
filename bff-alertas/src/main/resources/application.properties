spring.application.name=bff-alertas
server.port=${SERVER_PORT:8080}

alertas.microservice.url=${ALERTAS_MICROSERVICE_URL:http://localhost:8081/api/microservicio/alertas}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}


spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000
spring.cloud.openfeign.client.config.default.logger-level=basic

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Seguridad del BFF: Azure AD se usa solo en el frontend para login.
# El BFF acepta operaciones CRUD solo si la llamada viene a traves de AWS API Gateway,
# que debe inyectar este header secreto en la integracion hacia la VM.
app.gateway.security.enabled=${GATEWAY_SECURITY_ENABLED:true}
app.gateway.header-name=${API_GATEWAY_HEADER_NAME:X-Api-Gateway-Secret}
app.gateway.secret=${API_GATEWAY_SECRET:cambiar-este-secreto-en-la-vm}
